<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Icon Generator</title></head>
<body>
<p>アイコンを生成中...</p>
<script>
const src = 'ChatGPT Image 2026年6月21日 21_38_52.png';
const img = new Image();
img.onload = function() {
  [128, 48, 16].forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const c = canvas.getContext('2d');
    c.drawImage(img, 0, 0, size, size);
    const a = document.createElement('a');
    a.download = `icon${size}.png`;
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
  });
  document.querySelector('p').textContent = 'ダウンロード完了！icon16.png / icon48.png / icon128.png をこのフォルダに上書き保存してください。';
};
img.src = src;
</script>
</body>
</html>
